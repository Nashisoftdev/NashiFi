<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NashiFi</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#003c3c;color:#e2e8f0}
.container{max-width:1100px;margin:auto;padding:20px}

header{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-size:26px;font-weight:600;background:linear-gradient(90deg,#c98429,#f9bf5c);-webkit-background-clip:text;color:transparent}

input,select,button{
 background:#003131;border:1px solid #1e293b;padding:10px;border-radius:10px;color:white
}

button{background:#f9bf5c;color:#022c22;cursor:pointer;border:none}

.layout{display:grid;grid-template-columns:300px 1fr; gap:20px} 

.panel{background:#005151;padding:20px;border-radius:16px}

.token{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e293b}

.small{font-size:12px;opacity:.8}

canvas{max-height:260px}
</style>
</head>

<body>
<div class="container">

<header>
<div class="logo">NashiFi</div>

<div style="display:flex;gap:10px;flex-wrap:wrap">
<select id="chain"> 
<option value="eth">Ethereum</option>
<option value="polygon">Polygon</option>
<option value="arb">Arbitrum</option>
<!-- <option value="opt">Optimism</option> -->
<option value="base">Base</option>
<option value="bnb">BNB Chain</option>
</select>

<input id="address" placeholder="Cole o endereço da carteira">
<button onclick="load()">Buscar</button>
</div>
</header>

<div class="layout">

<div class="panel">
<h3>Total</h3>
<div id="total">$0</div>

<h3 style="margin-top:20px">Assets</h3>
<div id="tokens"></div>
</div>

<div class="panel">
<h3>Distribuição</h3>
<canvas id="chart"></canvas>
</div>

</div>
</div>

<script>

const KEY = "SHLBZlxaa-22e4vc4H5Wt";

// RPC
const RPC = {  
 eth: "https://eth-mainnet.g.alchemy.com/v2/",
 polygon: "https://polygon-mainnet.g.alchemy.com/v2/",
 arb: "https://arb-mainnet.g.alchemy.com/v2/",
 opt: "https://opt-mainnet.g.alchemy.com/v2/",
 base: "https://base-mainnet.g.alchemy.com/v2/",
 bnb: "https://bnb-mainnet.g.alchemy.com/v2/" 
};

// DeFiLlama chains
const LLAMA = {
 eth:"ethereum",
 polygon:"polygon",
 arb:"arbitrum",
 opt:"optimism",
 base:"base",
 bnb:"bsc"   
};

// Tokens nativos
const NATIVE = {  
 eth:{symbol:"ETH",decimals:18,id:"coingecko:ethereum"},
 polygon:{symbol:"POL",decimals:18,id:"coingecko:polygon-ecosystem-token"},
 arb:{symbol:"ETH",decimals:18,id:"coingecko:ethereum"},
 opt:{symbol:"ETH",decimals:18,id:"coingecko:ethereum"},
 base:{symbol:"ETH",decimals:18,id:"coingecko:ethereum"},
 bnb:{symbol:"BNB",decimals:18,id:"coingecko:binancecoin"},
 sol:{symbol:"SOL",decimals:18,id:"coingecko:solana"}
};

let chart;

// BigInt seguro
function format(hex, decimals){
 const balance = BigInt(hex);
 const divisor = BigInt(10)**BigInt(decimals);

 const int = balance/divisor;
 const frac = (balance%divisor).toString().padStart(decimals,'0').slice(0,8);

 return `${int}.${frac}`;
}

// preços ERC20
async function getPrices(list, chain){
 const ids = list.map(t=>`${LLAMA[chain]}:${t.contractAddress}`);
 const url = `https://coins.llama.fi/prices/current/${ids.join(",")}`;

 const res = await fetch(url);
 const data = await res.json();

 return data.coins || {};
}

async function load(){

 const addr = document.getElementById("address").value.trim();
 const chain = document.getElementById("chain").value;

 if(!addr) return alert("Digite um endereço");

 const tokensDiv = document.getElementById("tokens");
 tokensDiv.innerHTML="Carregando...";

 let total=0;
 let labels=[];
 let values=[];
 let finalList=[];

 try{

 // 🔥 NATIVE BALANCE
 const nativeRes = await fetch(RPC[chain]+KEY,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   jsonrpc:"2.0",
   method:"eth_getBalance",
   params:[addr,"latest"],
   id:1
  })
 });

 const nativeData = await nativeRes.json();

 const nativeInfo = NATIVE[chain];

 const nativeAmount = format(nativeData.result,nativeInfo.decimals);

 const priceRes = await fetch(`https://coins.llama.fi/prices/current/${nativeInfo.id}`);
 const priceData = await priceRes.json();

 const nativePrice = priceData.coins[nativeInfo.id]?.price || 0;

 const nativeUSD = nativePrice * parseFloat(nativeAmount);

 if(nativeUSD>0){
  finalList.push({
   symbol:nativeInfo.symbol,
   amount:nativeAmount,
   usd:nativeUSD
  });
 }

 // 🔥 ERC20
 const res = await fetch(RPC[chain]+KEY,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   jsonrpc:"2.0",
   method:"alchemy_getTokenBalances",
   params:[addr,"erc20"],
   id:1
  })
 });

 const data = await res.json();

 if(!data.result){
  tokensDiv.innerHTML="Erro na API";
  return;
 }

 let tokens = data.result.tokenBalances
  .filter(t=>t.tokenBalance!=="0x0")
  .slice(0,50);

 const prices = await getPrices(tokens.slice(0,30),chain);

 for(const t of tokens){

  const metaRes = await fetch(RPC[chain]+KEY,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
    jsonrpc:"2.0",
    method:"alchemy_getTokenMetadata",
    params:[t.contractAddress],
    id:1
   })
  });

  const meta = await metaRes.json();

  const symbol = meta.result?.symbol || "???";
  const decimals = meta.result?.decimals || 18;

  const amount = format(t.tokenBalance,decimals);

  const key = `${LLAMA[chain]}:${t.contractAddress}`;
  const price = prices[key]?.price || 0;

  const usd = price * parseFloat(amount);

  if(usd>0){
   finalList.push({symbol,amount,usd});
  }
 }

 // ordena
 finalList.sort((a,b)=>b.usd-a.usd);

 tokensDiv.innerHTML="";

 finalList.forEach(t=>{
  total+=t.usd;

  labels.push(t.symbol);
  values.push(t.usd);

  const el=document.createElement("div");
  el.className="token";

  el.innerHTML=`
   <div>
    <div>${t.symbol}</div>
    <div class="small">${t.amount}</div>
   </div>
   <div>$${t.usd.toFixed(2)}</div>
  `;

  tokensDiv.appendChild(el);
 });

 document.getElementById("total").innerText="$"+total.toFixed(2);

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{labels,datasets:[{data:values}]}
 });

 }catch(e){
  console.log(e);
  tokensDiv.innerHTML="Erro ao carregar";
 }

}
</script>

</body>
</html>
